<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | CONTAINERS_GAME</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <canvas id="unity-canvas" width=720 height=1280 tabindex="-1" style="width: 720px; height: 1280px; background: #231F20"></canvas>
    <script src="Build/WebBuild.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        dataUrl: "Build/WebBuild.data",
        frameworkUrl: "Build/WebBuild.framework.js",
        codeUrl: "Build/WebBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Brouillard Games",
        productName: "CONTAINERS_GAME",
        productVersion: "0.1",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      });
    </script>
	
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    function SendMessageToUnity(objectName, methodName, data) {
        if (typeof unityInstance !== 'undefined' && unityInstance !== null) {
            unityInstance.SendMessage(objectName, methodName, data);
        } else {
            console.error("Ошибка: unityInstance не найден!");
        }
    }

    function GetTelegramUserData() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            console.log("Telegram WebApp API загружен");

            if (window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user) {
                let userData = JSON.stringify(window.Telegram.WebApp.initDataUnsafe.user);
                console.log("Отправка данных пользователя в Unity:", userData);
                SendMessageToUnity('TelegramManager', 'OnTelegramUserDataReceived', userData);
            } else {
                console.error("Ошибка: нет данных о пользователе!");
                SendMessageToUnity('TelegramManager', 'OnTelegramUserDataReceived', '{}');
            }
        } else {
            console.error("Ошибка: Telegram API не загружен!");
        }
    }
</script>
	
  </body>
</html>
