<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App - Get Username</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        // Функция для получения и отображения никнейма пользователя
        function getTelegramUsername() {
            if (window.Telegram && window.Telegram.WebApp) {
                let user = window.Telegram.WebApp.initDataUnsafe.user;  // Получаем данные пользователя
             //   const username = user ? user.username : 'Неизвестный';  // Если есть username, отображаем его, иначе 'Неизвестный'

                let jsonUser = JSON.stringify(user);
                console.log("Telegram User Data:", jsonUser);

                // Отображаем username в элементе с id 'usernameDisplay'
                document.getElementById('usernameDisplay').textContent = `Никнейм: ${user.username}`;
            } else {
                console.log('Telegram WebApp API не доступен.');
                alert('Ошибка: Telegram WebApp API не доступен.');
            }
        }
    </script>
</head>
<body>

    <h1>Telegram Mini App</h1>
    <p>Нажмите кнопку для получения вашего никнейма в Telegram.</p>

    <!-- Кнопка для получения никнейма -->
    <button onclick="getTelegramUsername()">Получить никнейм</button>

    <!-- Место для отображения никнейма -->
    <p id="usernameDisplay">Здесь будет ваш никнейм.</p>

</body>
</html>
